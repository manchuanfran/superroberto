<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Super Roberto</title>
  <style>
    :root {
      --ink: #171717;
      --muted: #77716b;
      --line: #ece8e3;
      --paper: #ffffff;
      --soft: #faf8f5;
      --accent: #f05a28;
      --accent-deep: #c63f1d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100%, 1120px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px 18px 36px;
      display: flex;
      flex-direction: column;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 4px 0 46px;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #77716b;
      font-size: 12px;
      white-space: nowrap;
    }

    .nav a {
      padding: 8px 0;
      border-bottom: 1px solid transparent;
    }

    .nav a:hover,
    .nav a:focus-visible,
    .nav .active {
      color: var(--ink);
      border-color: var(--accent);
      outline: none;
    }

    .contact-hero {
      padding: 20px 0 64px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
      color: var(--accent-deep);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .kicker::before {
      content: "";
      width: 34px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(58px, 15vw, 150px);
      line-height: .88;
      font-weight: 650;
      letter-spacing: 0;
    }

    .contact-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      margin: 0;
      padding: 42px 0 0;
      list-style: none;
    }

    .contact-item {
      display: grid;
      grid-template-columns: 104px 1fr;
      gap: 18px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }

    .contact-item span {
      color: var(--accent-deep);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .contact-item strong {
      font-size: clamp(22px, 7vw, 56px);
      line-height: 1;
      font-weight: 620;
    }

    .note {
      max-width: 360px;
      margin: auto 0 0 auto;
      padding-top: 48px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      text-align: right;
    }

    @media (min-width: 760px) {
      .page {
        padding: 34px 34px 54px;
      }

      .contact-list {
        padding-top: 58px;
      }

      .contact-item {
        grid-template-columns: 170px 1fr;
        align-items: baseline;
      }
    }

    @media (max-width: 520px) {
      .site-header {
        align-items: flex-start;
        padding-bottom: 34px;
      }

      .nav {
        gap: 10px;
        font-size: 11px;
      }

      .contact-hero {
        padding-bottom: 46px;
      }

      .contact-item {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .note {
        margin-left: 0;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header">
      <a class="brand" href="index.html">Super Roberto</a>
      <nav class="nav" aria-label="Navegacion principal">
        <a href="index.html">Inicio</a>
        <a href="ofertas.html">Ofertas</a>
        <a class="active" href="contacto.html">Contacto</a>
      </nav>
    </header>

    <section class="contact-hero" aria-labelledby="contact-title">
      <div class="kicker">Visitanos</div>
      <h1 id="contact-title">simple,<br>near,<br>daily</h1>
    </section>

    <ul class="contact-list">
      <li class="contact-item">
        <span>WhatsApp</span>
        <strong>11 5333 4136</strong>
      </li>
      <li class="contact-item">
        <span>Dirección</span>
        <strong>Eva Perón 2277, Lanús</strong>
      </li>
      <li class="contact-item">
        <span>Horario</span>
        <strong>9:00-14:00 / 17:00-21:00</strong>
      </li>
    </ul>

    <p class="note">Provincia Buenos Aires. Ofertas sujetas a disponibilidad del día.</p>
  </main>
</body>
</html>
